<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ViewIt — Video Calling</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <span>Sender</span>
    <video
      controls
      autoplay
      muted
      playsinline
      style="width: 500px; height: auto"
    >
      <source src="./sample.mp4" type="video/mp4" />
    </video>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="./js/sender.js"></script>
  </body>
</html>
